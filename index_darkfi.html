<script type="module">
import init, {
  build_transfer_with_fee,
  try_decrypt_raw_note,
  create_wallet,
  import_wallet,
} from "./pkg/darkfi_wasm.js";

await init();

const LAST_NOTE_ID_KEY = "darkfi_last_note_id";
const WALLET_SCAN_CURSOR = "darkfi_wallet_last_note_id";
const BRIDGE = "http://192.168.1.49:8789";
const SECRET_KEY_NAME = "darkfi_secret_key";
const STATE_KEY_NAME = "darkfi_wallet_state";
const STATE_VERSION = 2;
const BUILT_TX_KEY_NAME = "darkfi_built_tx_base64";
const FEELESS_TX_KEY_NAME = "darkfi_fee_less_tx_base64";
const DEFAULT_DARKFI_FEE = 1000000n;
const FEE_CACHE_KEY = "darkfi_last_required_fee";
const FEE_BUFFER = 250000n;
const DARK_TOKEN_ID = "TokenId(0x267f9b7c64549bf080307d045bd0bd7ae4389093f6b2896114ec4e523a77a10f)";
const zkbins = {
  mint: null,
  burn: null,
  fee: null
};
let transferWorker = null;
let transferWorkerCallId = 0;

const out = document.getElementById("out");
const output1 = document.getElementById("output");
const balanceBox = document.getElementById("balanceBox");

window.saveSecret = function () {
  const secret = document.getElementById("secretKey").value.trim();

  if (!secret) {
    show({ ok:false, error:"Missing secret key" });
    return;
  }

  const previousSecret = localStorage.getItem(SECRET_KEY_NAME);

  localStorage.setItem(SECRET_KEY_NAME, secret);

  if (previousSecret && previousSecret !== secret) {
    localStorage.removeItem(STATE_KEY_NAME);
    localStorage.removeItem(LAST_NOTE_ID_KEY);
    localStorage.removeItem(BUILT_TX_KEY_NAME);
    localStorage.removeItem(FEELESS_TX_KEY_NAME);
  }

  show({
    ok:true,
    saved:true
  });
};

window.loadSecret = function () {
  let secret = localStorage.getItem(SECRET_KEY_NAME) || "";
  let created = false;

  const wallet = secret
    ? import_wallet(secret)
    : create_wallet();

  if (!wallet || wallet.ok === false) {
    show({
      ok: false,
      error: wallet?.error || "Wallet load/create failed"
    });
    return;
  }

  if (!secret) {
    secret = wallet.secret_key;
    localStorage.setItem(SECRET_KEY_NAME, secret);
    created = true;
  }

document.getElementById("qr-address").textContent =
  wallet.address;

  renderQr(wallet.address);

  document.getElementById("secretKey").value = secret;

  show({
    ok: true,
    loaded: !created,
    created,
    saved: created
  });


};

async function getJson(url) {
  const r = await fetch(url);
  return await r.json();
}

async function postJson(url, body = {}) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  return await r.json();
}

async function getBytes(url) {
  const r = await fetch(url);

  if (!r.ok) {
    throw new Error(`Fetch failed ${url}: ${r.status}`);
  }

  return new Uint8Array(await r.arrayBuffer());
}

async function getMoneyZkbin(name) {
  if (!zkbins[name]) {
    zkbins[name] = await getBytes(`${BRIDGE}/api/zkas/money/${name}`);
  }

  return zkbins[name];
}

function getCachedFee() {
  const cached = BigInt(localStorage.getItem(FEE_CACHE_KEY) || "0");
  return cached > DEFAULT_DARKFI_FEE ? cached : DEFAULT_DARKFI_FEE;
}

function cacheNextFee(nextFee) {
  const fee = nextFee > DEFAULT_DARKFI_FEE ? nextFee : DEFAULT_DARKFI_FEE;

  localStorage.setItem(FEE_CACHE_KEY, fee.toString());
  document.getElementById("fee").value = fee.toString();

  return fee;
}

function showTransferError(err, stage) {
  const payload = {
    ok: false,
    stage,
    error: err?.stack || err?.message || String(err)
  };

  show(payload);
  showOutput(payload);
}

function nextUiFrame() {
  return new Promise(resolve => requestAnimationFrame(() => resolve()));
}

function getTransferWorker() {
  if (!transferWorker) {
    transferWorker = new Worker("./transfer-worker.js?v=4", { type: "module" });
  }

  return transferWorker;
}

function resetTransferWorker() {
  if (transferWorker) {
    transferWorker.terminate();
    transferWorker = null;
  }
}

function runTransferWorker(task, payload) {
  const worker = getTransferWorker();
  const id = ++transferWorkerCallId;

  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      worker.removeEventListener("message", onMessage);
      worker.removeEventListener("error", onError);
      resetTransferWorker();
      reject(new Error(`${task} timed out in transfer worker after 180 seconds`));
    }, 180000);

    const onMessage = event => {
      if (event.data?.id !== id) {
        return;
      }

      clearTimeout(timeout);
      worker.removeEventListener("message", onMessage);
      worker.removeEventListener("error", onError);

      if (event.data.ok) {
        resolve(event.data.result);
      } else {
        reject(new Error(event.data.error || "Transfer worker failed"));
      }
    };

    const onError = event => {
      clearTimeout(timeout);
      worker.removeEventListener("message", onMessage);
      worker.removeEventListener("error", onError);
      resetTransferWorker();
      reject(new Error([
        event.message || "Transfer worker error",
        event.filename ? `file=${event.filename}` : null,
        event.lineno ? `line=${event.lineno}` : null,
        event.colno ? `column=${event.colno}` : null
      ].filter(Boolean).join(" ")));
    };

    worker.addEventListener("message", onMessage);
    worker.addEventListener("error", onError);
    worker.postMessage({ id, task, payload });
  });
}

async function runTransferWorkerWithHeartbeat(task, payload, status) {
  let seconds = 0;
  let done = false;

  const timer = setInterval(() => {
    if (done) {
      return;
    }

    seconds += 1;
    showOutput({
      ...status,
      worker: true,
      elapsed_seconds: seconds
    });
  }, 1000);

  try {
    showOutput({
      ...status,
      worker: true,
      elapsed_seconds: seconds
    });

    return await runTransferWorker(task, payload);
  } finally {
    done = true;
    clearInterval(timer);
  }
}

function loadState() {
  const raw = localStorage.getItem(STATE_KEY_NAME);

  if (!raw) {
    return null;
  }

  const state = JSON.parse(raw);

  if (state.version !== STATE_VERSION) {
    localStorage.removeItem(STATE_KEY_NAME);
    localStorage.removeItem(LAST_NOTE_ID_KEY);
    localStorage.removeItem(BUILT_TX_KEY_NAME);
    localStorage.removeItem(FEELESS_TX_KEY_NAME);
    return null;
  }

  return state;
}

async function ensureFreshWalletState() {
  const [latest, status] = await Promise.all([
    getJson(`${BRIDGE}/api/last-block`),
    getJson(`${BRIDGE}/api/index/status`)
  ]);

  if (!latest.ok || !status.ok) {
    throw new Error("Could not check indexer freshness");
  }

  if (Number(status.last_scanned_height) < Number(latest.height)) {
    show({
      syncing:true,
      stage:"indexer behind, syncing before build",
      indexed_height: status.last_scanned_height,
      node_height: latest.height
    });

    const sync = await postJson(`${BRIDGE}/api/index/sync`);

    if (!sync.ok) {
      throw new Error(sync.error || "Indexer sync failed");
    }

    await scanWallet();
  }

  return loadState();
}

function parsePositiveBigInt(id) {
  const value = document.getElementById(id).value.trim();

  if (!/^[0-9]+$/.test(value) || BigInt(value) <= 0n) {
    throw new Error(`${id} must be a positive integer in atomic units`);
  }

  return BigInt(value);
}

function chooseTransferCoin(spendableCoins, amount) {
  return spendableCoins.find(coin =>
    BigInt(coin.decrypt?.value || 0) >= amount
  );
}

function normalizeNullifier(value) {
  return String(value || "")
    .replace(/^Nullifier\(/, "")
    .replace(/\)$/, "")
    .trim()
    .toLowerCase();
}

function chooseFeeCoin(spendableCoins, transferCoin, fee) {
  const transferNullifier = normalizeNullifier(transferCoin.decrypt?.nullifier);

  return spendableCoins.find(coin =>
    normalizeNullifier(coin.decrypt?.nullifier) !== transferNullifier &&
    BigInt(coin.decrypt?.value || 0) > fee
  );
}

async function refreshWitness(coin) {
  const witness = await postJson(`${BRIDGE}/api/index/witness`, {
    coin: coin.coin
  });

  if (!witness.ok) {
    throw new Error(witness.error || `Witness refresh failed for leaf ${coin.leaf_position}`);
  }

  return {
    ...coin,
    leaf_position: witness.leaf_position,
    witness
  };
}

async function refreshWitnesses(coins) {
  const unique = [];
  const seen = new Set();

  for (const coin of coins) {
    if (!coin || seen.has(coin.coin)) {
      continue;
    }

    seen.add(coin.coin);
    unique.push(coin);
  }

  const result = await postJson(`${BRIDGE}/api/index/witnesses`, {
    coins: unique.map(coin => coin.coin)
  });

  if (!result.ok) {
    throw new Error(result.error || "Witness batch refresh failed");
  }

  const refreshed = new Map();

  for (const coin of unique) {
    const witness = result.witnesses?.[coin.coin];

    if (!witness?.ok) {
      throw new Error(witness?.error || `Witness refresh failed for coin ${coin.coin}`);
    }

    refreshed.set(coin.coin, {
      ...coin,
      leaf_position: witness.leaf_position,
      witness
    });
  }

  return coins.map(coin => refreshed.get(coin.coin));
}

window.syncIndexer = async function () {
  show({ syncing:true });

  const result = await postJson(`${BRIDGE}/api/index/sync`);

window.scanWallet = async function () {
  console.time("scan wallet incremental");
  const secret = localStorage.getItem(SECRET_KEY_NAME);

  if (!secret) {
    show({ ok:false, error:"Save secret key first" });
    return;
  }

  const oldState = loadState() || { ownedCoins: [] };
  const resetScan = !oldState.ownedCoins?.length;
  const ownedById = new Map(
    (oldState.ownedCoins || [])
      .filter(coin => coin.id != null)
      .map(coin => [Number(coin.id), coin])
  );
  const ownedWithoutId = (oldState.ownedCoins || [])
    .filter(coin => coin.id == null);

  const lastId = resetScan
    ? 0
    : Number(localStorage.getItem(LAST_NOTE_ID_KEY) || 0);

  console.time("scan fetch notes-since/nullifiers");
  const notesResult = await getJson(
    `${BRIDGE}/api/index/notes-since/${lastId}`
  );

  const nullifiersResult = await getJson(`${BRIDGE}/api/index/nullifiers`);
  console.timeEnd("scan fetch notes-since/nullifiers");

  if (!notesResult.ok) {
    show(notesResult);
    console.timeEnd("scan wallet incremental");
    return;
  }

  if (!nullifiersResult.ok) {
    show(nullifiersResult);
    console.timeEnd("scan wallet incremental");
    return;
  }

  const spentSet = new Set(
    (nullifiersResult.nullifiers || []).map(normalizeNullifier)
  );

  let maxId = lastId;

  console.time("scan decrypt new notes");
  for (const note of notesResult.notes || []) {
    maxId = Math.max(maxId, Number(note.id || 0));

    let decrypt;
    try {
      decrypt = try_decrypt_raw_note(
        secret,
        note.encrypted_note_hex,
        note.coin
      );
    } catch {
      continue;
    }

    if (!decrypt?.owned) continue;

    const coin = {
      id: note.id,
      height: note.height,
      tx_hash: note.tx_hash,
      tx_index: note.tx_index,
      call_index: note.call_index,
      leaf_position: note.leaf_position,
      coin: note.coin,
      encrypted_note_hex: note.encrypted_note_hex,
      is_block_reward: !!note.is_block_reward,
      owned: true,
      decrypt
    };

    ownedById.set(Number(note.id), coin);
  }
  console.timeEnd("scan decrypt new notes");

  const ownedCoins = [
    ...ownedWithoutId,
    ...Array.from(ownedById.values()).sort((a, b) => Number(a.id || 0) - Number(b.id || 0))
  ];
  const spendableCoins = [];
  const spentCoins = [];
  const balances = {};

  for (const coin of ownedCoins) {
    if (spentSet.has(normalizeNullifier(coin.decrypt?.nullifier))) {
      spentCoins.push(coin);
      continue;
    }

    spendableCoins.push(coin);

    const token = coin.decrypt?.token_id;
    balances[token] = (balances[token] || 0) + Number(coin.decrypt?.value || 0);
  }

  localStorage.setItem(LAST_NOTE_ID_KEY, String(maxId));

  const state = {
    ok: true,
    version: STATE_VERSION,
    owned_count: ownedCoins.length,
    spendable_count: spendableCoins.length,
    spent_count: spentCoins.length,
    balances,
    ownedCoins,
    spendableCoins,
    spentCoins,
    updated_at: new Date().toISOString()
  };

  localStorage.setItem(STATE_KEY_NAME, JSON.stringify(state));

  show({
    ok: true,
    version: STATE_VERSION,
    owned_count: ownedCoins.length,
    spendable_count: spendableCoins.length,
    spent_count: spentCoins.length,
    new_notes: notesResult.notes?.length || 0,
    last_note_id: maxId,
    sample_nullifier: ownedCoins[0]?.decrypt?.nullifier || null
  });

  const bal = Number(balances[DARK_TOKEN_ID] || 0);
  document.getElementById("qr-amount").textContent = (bal / 100000000).toFixed(8) + " DRK";
  console.timeEnd("scan wallet incremental");

};



window.buildTransferWithFee = async function () {
  try {
    const secret = localStorage.getItem(SECRET_KEY_NAME);

    if (!secret) {
      show({ ok:false, error:"Save secret key first" });
      return;
    }

    console.time("1 ensureFreshWalletState");
    const state = await ensureFreshWalletState();
    console.timeEnd("1 ensureFreshWalletState");

    if (!state?.spendableCoins?.length) {
      show({ ok:false, error:"Scan wallet first" });
      return;
    }

    const recipient = prompt("Type in recipient:");
    const amount = BigInt(Math.round(parseFloat(prompt("Type in amount:") || "0") * 100000000));

    if (!recipient || amount <= 0n) return;

    showOutput({"tx":"processing..."})

    if (!recipient) {
      show({ ok:false, error:"Missing recipient" });
      return;
    }

    let transferCoin = chooseTransferCoin(state.spendableCoins, amount);

    if (!transferCoin) {
      show({ ok:false, error:"No spendable coin large enough for amount" });
      return;
    }

    show({
      building:true,
      stage:"building transfer with cached fee",
      transfer_leaf: transferCoin.leaf_position
    });

    const fee = getCachedFee();

    document.getElementById("fee").value = String(fee);

    let feeCoin = chooseFeeCoin(state.spendableCoins, transferCoin, fee);
    let transferCoinValue = BigInt(transferCoin.decrypt?.value || 0);
    let useTransferChangeForFee = !feeCoin && transferCoinValue > amount + fee;

    if (!feeCoin && !useTransferChangeForFee) {
      show({
        ok:false,
        error:"No separate spendable fee coin large enough for cached/default fee, and transfer coin has insufficient change to pay fee",
        fee: String(fee)
      });
      return;
    }

    console.time("2 refresh send witnesses");
    if (useTransferChangeForFee) {
      [transferCoin] = await refreshWitnesses([transferCoin]);
      feeCoin = transferCoin;
    } else {
      [transferCoin, feeCoin] = await refreshWitnesses([transferCoin, feeCoin]);
    }
    console.timeEnd("2 refresh send witnesses");

    show({
      building:true,
      stage:"building transfer with fee",
      transfer_leaf: transferCoin.leaf_position,
      fee_leaf: feeCoin.leaf_position,
      fee_source: useTransferChangeForFee ? "transfer_change_tx_local" : "separate_coin",
      fee: String(fee)
    });

    console.time("3 fetch cached zkbins");
    const [mintZkbin, burnZkbin, feeZkbin] = await Promise.all([
      getMoneyZkbin("mint"),
      getMoneyZkbin("burn"),
      getMoneyZkbin("fee")
    ]);
    console.timeEnd("3 fetch cached zkbins");

    console.time("3a worker wasm init");
    await runTransferWorker("ping", {});
    console.timeEnd("3a worker wasm init");

    console.time("4 build with fee WASM");
    const builtRaw = await runTransferWorkerWithHeartbeat(
      "build_transfer_with_fee",
      {
        secret,
        coinJson: JSON.stringify(transferCoin),
        feeCoinJson: JSON.stringify(feeCoin),
        recipient,
        amount,
        fee,
        mintZkbin,
        burnZkbin,
        feeZkbin
      },
      {
        tx: "building transfer with fee in wasm worker",
        transfer_leaf: transferCoin.leaf_position,
        fee_leaf: feeCoin.leaf_position,
        fee_source: useTransferChangeForFee ? "transfer_change_tx_local" : "separate_coin",
        fee: String(fee)
      }
    );
    console.timeEnd("4 build with fee WASM");

    const built = JSON.parse(builtRaw);

    if (built.ok && built.tx_base64) {
      localStorage.setItem(BUILT_TX_KEY_NAME, built.tx_base64);
    } else {
      show({
        ...built,
        transfer_leaf: transferCoin.leaf_position,
        fee_leaf: feeCoin.leaf_position
      });
      return;
    }

    show({
      ...built,
      transfer_leaf: transferCoin.leaf_position,
      fee_leaf: feeCoin.leaf_position
    });

    console.time("5 broadcast");
    await window.broadcastBuiltTx()
    console.timeEnd("5 broadcast");
  } catch (err) {
    show({ ok:false, error:String(err) });
  }
};

window.broadcastBuiltTx = async function () {
  const txBase64 = localStorage.getItem(BUILT_TX_KEY_NAME);

  if (!txBase64) {
    show({ ok:false, error:"Build a transaction first" });
    return;
  }

  const result = await postJson(`${BRIDGE}/api/broadcast`, {
    tx_base64: txBase64
  });

  if (!result.ok) {
    try {
      console.time("broadcast failure fee estimate");
      const estimate = await postJson(`${BRIDGE}/api/estimate-fee`, {
        tx_base64: txBase64
      });
      console.timeEnd("broadcast failure fee estimate");

      if (estimate.ok && estimate.required_fee != null) {
        const nextFee = cacheNextFee(BigInt(estimate.required_fee) + FEE_BUFFER);

        show({
          ...result,
          likely_reason: "cached/default fee was too low for this transaction",
          estimate,
          cached_next_fee: nextFee.toString(),
          next_step: "Send again; the next build will use cached_next_fee"
        });
        return;
      }

      const fallbackFee = cacheNextFee(getCachedFee() * 2n);

      show({
        ...result,
        likely_reason: "transaction simulation failed; cached/default fee may be too low or tx state is stale",
        estimate,
        cached_next_fee: fallbackFee.toString(),
        next_step: "Send again; the next build will use cached_next_fee"
      });
      return;
    } catch (err) {
      const fallbackFee = cacheNextFee(getCachedFee() * 2n);

      show({
        ...result,
        likely_reason: "transaction simulation failed; cached/default fee may be too low or tx state is stale",
        fee_recovery_error: String(err),
        cached_next_fee: fallbackFee.toString(),
        next_step: "Send again; the next build will use cached_next_fee"
      });
      return;
    }
  }

  
  if (result.ok) {
  await postJson(`${BRIDGE}/api/index/sync`);
  await scanWallet();
}
 show(result);
};

window.estimateLastBuiltFee = async function () {
  const txBase64 = localStorage.getItem(BUILT_TX_KEY_NAME);

  if (!txBase64) {
    show({ ok:false, error:"Build a transaction first" });
    return;
  }

  console.time("dev estimate last built fee");
  const estimate = await postJson(`${BRIDGE}/api/estimate-fee`, {
    tx_base64: txBase64
  });
  console.timeEnd("dev estimate last built fee");

  if (estimate.ok && estimate.required_fee != null) {
    cacheNextFee(BigInt(estimate.required_fee) + FEE_BUFFER);
  } else {
    cacheNextFee(getCachedFee() * 2n);
  }

  show({
    ...estimate,
    cached_fee: localStorage.getItem(FEE_CACHE_KEY)
  });
};

window.loadSecret();
</script>
